name: Build and Test

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: gradle  # ← built-in Gradle caching for setup-java

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install Android SDK packages
      run: |
        sdkmanager "platforms;android-36" "build-tools;34.0.0" "platforms;android-33" "system-images;android-33;google_apis;x86_64"

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Cache Gradle wrapper and build cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          .gradle/build-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build project
      run: ./gradlew assembleDebug --no-daemon --parallel --info

    - name: Run unit tests
      run: ./gradlew testDebugUnitTest --no-daemon --parallel --info

    - name: Run Android instrumentation tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 33
        target: google_apis
        arch: x86_64
        emulator-boot-timeout: 300
        script: ./gradlew connectedDebugAndroidTest --no-daemon --parallel --info

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          app/build/reports/tests/
          app/build/test-results/
        retention-days: 7
